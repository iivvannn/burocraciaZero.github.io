<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style-login.css">
</head>
<body>
    
    <main>

        <div class="contenedor_todo">
            <div class="caja_trasera">
                <div class="caja_trasera_login">
                    <h3>¿Ya tienes cuenta?</h3>
                    <p>Inicia sesión</p>
                    <button id="btt_iniciar-sesion">Iniciar sesión</button>
                </div>
                <div class="caja_trasera_registrar">
                    <h3>¿No tienes cuenta?</h3>
                    <p>Regístrate</p>
                    <button id="btt_registrarse">Registrarse</button>
                </div>
            </div>

            <div class="contenedor_login-register">
                <!--Formulario para iniciar sesion-->
                <form action="" class="formulario_login">
                    <h2>Iniciar sesión</h2>
                    <input type="text" placeholder="Usuario">
                    <input type="password" placeholder="Contraseña">
                    <button id="btt_login">Loguearse</button>
                </form>
                <!--Formulario para registrarse-->
                <form action="" class="formulario_register">
                    <h2>Registrarse</h2>
                    <input type="text" placeholder="Usuario">
                    <input type="password" placeholder="Contraseña">
                    <button id="btt_registrar">Registrarse</button>
                </form>
            </div>



        </div>


    </main>


    <script src="login.js"></script>

</body>
</html>
